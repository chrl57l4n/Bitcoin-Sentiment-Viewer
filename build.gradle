name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle Permissions
        run: chmod +x gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      # HTML-Dashboard ins assets-Verzeichnis kopieren
      - name: Copy Dashboard HTML to Assets
        run: |
          mkdir -p app/src/main/assets
          if [ -f "bitcoin-enhanced.html" ]; then
            cp bitcoin-enhanced.html app/src/main/assets/
            echo "✅ bitcoin-enhanced.html copied to assets"
          else
            echo "⚠️  bitcoin-enhanced.html not found – using placeholder"
            echo "<html><body style='background:#060a10;color:#f7931a;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0'><h1>₿ Dashboard wird geladen…</h1></body></html>" \
              > app/src/main/assets/bitcoin-enhanced.html
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-dashboard-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: bitcoin-dashboard-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: bitcoin-dashboard-release
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          generate_release_notes: true
          body: |
            ## Bitcoin Dashboard ${{ github.ref_name }}
            
            ### Installation
            1. APK herunterladen
            2. Auf Android-Gerät übertragen
            3. Unbekannte Quellen in den Einstellungen erlauben
            4. APK installieren
            
            **Zielgerät:** Snapdragon 8 (arm64-v8a)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
